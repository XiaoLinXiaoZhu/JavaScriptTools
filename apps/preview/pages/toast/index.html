<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast — 组件预览</title>
  <link rel="stylesheet" href="../../shared/layout.css">
</head>
<body>
  <a class="back-link" href="/">← 返回目录</a>
  <h1>Toast 消息浮窗</h1>
  <p class="subtitle">轻量级消息提示，支持多种类型和位置配置</p>

  <div class="section">
    <h2>基础类型</h2>
    <div class="btn-group">
      <button class="demo-btn" id="toast-info">Info 消息</button>
      <button class="demo-btn" id="toast-success">Success 成功</button>
      <button class="demo-btn" id="toast-warning">Warning 警告</button>
      <button class="demo-btn" id="toast-error">Error 错误</button>
    </div>
    <p class="hint">消息从右上角弹出，3 秒后自动消失</p>
  </div>

  <div class="section">
    <h2>连续消息</h2>
    <div class="btn-group">
      <button class="demo-btn" id="toast-multi">连续 3 条</button>
    </div>
    <p class="hint">多条消息会依次堆叠显示</p>
  </div>

  <div class="section">
    <h2>位置切换</h2>
    <div class="btn-group">
      <button class="demo-btn" id="toast-position">切换位置</button>
    </div>
    <p class="hint">每次点击切换到下一个位置（6 个方位循环）</p>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
