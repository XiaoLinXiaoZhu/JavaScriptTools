<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组件预览 — 端到端测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px;
      background: #f8f8f8;
      color: #222;
      min-height: 100vh;
    }
    h1 { margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 14px; }
    .section { margin-bottom: 40px; }
    .section h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #fb7299;
    }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .demo-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .demo-btn:hover {
      border-color: #fb7299;
      color: #fb7299;
    }
    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>组件预览</h1>
  <p class="subtitle">
    此页面使用与 src/ 脚本相同的导入路径（@xlxz/components dist 产物），端到端验证组件行为。
  </p>

  <div class="section">
    <h2>Toast 消息浮窗</h2>
    <div class="btn-group">
      <button class="demo-btn" id="toast-info">Info 消息</button>
      <button class="demo-btn" id="toast-success">Success 成功</button>
      <button class="demo-btn" id="toast-warning">Warning 警告</button>
      <button class="demo-btn" id="toast-error">Error 错误</button>
      <button class="demo-btn" id="toast-multi">连续 3 条</button>
      <button class="demo-btn" id="toast-position">切换位置</button>
    </div>
    <p class="hint">消息从右上角弹出，3 秒后自动消失</p>
  </div>

  <div class="section">
    <h2>ConfigPanel 配置面板</h2>
    <div class="btn-group">
      <button class="demo-btn" id="panel-toggle">显示/隐藏面板</button>
    </div>
    <p class="hint">面板出现在右上角，拖动滑块调整值，保存按钮 hover 显示提示</p>
  </div>

  <div class="section">
    <h2>FloatingPanel 浮动面板</h2>
    <div class="btn-group">
      <button class="demo-btn" id="float-toggle">显示/隐藏浮动面板</button>
    </div>
    <p class="hint">拖动标题栏移动，拖动右下角调整大小，点红色按钮关闭</p>
  </div>

  <div class="section">
    <h2>AnimatedSlider 动画滑动条</h2>
    <div id="slider-demo" style="max-width: 400px; display: flex; flex-direction: column; gap: 16px;"></div>
    <p class="hint">拖动滑块，数字会以动画形式过渡到新值（基于 number-flow）</p>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
